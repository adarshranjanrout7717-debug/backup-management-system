<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     
    <meta http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate">

    <meta http-equiv="Pragma"
      content="no-cache">

    <meta http-equiv="Expires"
      content="0">

    <title>Railway Backup Monitoring System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">

<div class="bg-primary text-white p-3 shadow">

    <h2 class="mb-0">
        <i class="fa-solid fa-database"></i>
        Railway Backup Monitoring System
    </h2>

    <small>
        Real-Time Backup Monitoring & Disaster Recovery
    </small>

</div>

<div class="container-fluid p-3">

    <!-- Navigation -->

    <div class="card mb-3 shadow-sm">

        <div class="card-body">

            <ul class="nav nav-tabs">

                <li class="nav-item">
                    <button class="nav-link active"
                            onclick="showTab('homeTab')">
                        Home
                    </button>
                </li>

                <li class="nav-item">
                    <button class="nav-link"
                            onclick="showTab('instanceTab')">
                        Add New Instance
                    </button>
                </li>

                <li class="nav-item">
                    <button class="nav-link"
                            onclick="showTab('logsTab')">
                        Logs
                    </button>
                </li>

                <li class="nav-item ms-auto">

                    <button class="btn btn-danger"
                            onclick="logout()">

                        <i class="fa-solid fa-right-from-bracket"></i>
                        Logout

                    </button>

                </li>

            </ul>

        </div>

    </div>

    <!-- HOME TAB -->

    <div id="homeTab">

        <div class="row">

            <!-- Instance List -->

            <div class="col-lg-3">

                <div class="card shadow-sm">

                    <div class="card-header bg-dark text-white">

                        <h5 class="mb-0">
                            <i class="fa-solid fa-server"></i>
                            Instances
                        </h5>

                    </div>

                    <div class="card-body">

                        <div id="instanceList">

                        </div>

                    </div>

                </div>

            </div>

            <!-- Instance Details -->

            <div class="col-lg-9">

                <div class="card shadow-sm">

                    <div class="card-header bg-dark text-white">

                        <h5 class="mb-0">
                            Instance Details
                        </h5>

                    </div>

                    <div class="card-body">

                        <div class="row">

                            <div class="col-md-6">

                                <div class="mb-3">
                                    <label class="fw-bold">Instance Name</label>
                                    <input id="instanceName"
                                           class="form-control"
                                           readonly>
                                </div>

                                <div class="mb-3">
                                    <label class="fw-bold">Database Type</label>
                                    <input id="databaseType"
                                           class="form-control"
                                           readonly>
                                </div>

                                <div class="mb-3">
                                    <label class="fw-bold">Instance IP</label>
                                    <input id="instanceIp"
                                           class="form-control"
                                           readonly>
                                </div>

                                <div class="mb-3">
                                    <label class="fw-bold">Status</label>
                                    <input id="instanceStatus"
                                           class="form-control"
                                           readonly>
                                </div>

                                <div class="mb-3">
                                    <label class="fw-bold">Last Down Time</label>
                                    <input id="lastDownTime"
                                           class="form-control"
                                           readonly>
                                </div>

                                <div class="mb-3">
                                    <label class="fw-bold">Last Backup Location</label>
                                    <input id="lastBackupLocation"
                                           class="form-control"
                                           readonly>
                                </div>

                            </div>

                            <div class="col-md-6">

                                <div class="mb-3">
                                    <label class="fw-bold">Last Backup Date</label>
                                    <input id="lastBackupDate"
                                           class="form-control"
                                           readonly>
                                </div>

                                <div class="mb-3">
                                    <label class="fw-bold">Last Backup Duration</label>
                                    <input id="backupDuration"
                                           class="form-control"
                                           readonly>
                                </div>

                                <div class="mb-3">
                                    <label class="fw-bold">Last Backup File Size</label>
                                    <input id="backupSize"
                                           class="form-control"
                                           readonly>
                                </div>

                                <div class="mb-3">
                                    <label class="fw-bold">Last Backup Remark</label>

                                    <textarea id="backupRemark"
                                              rows="4"
                                              class="form-control"
                                              readonly></textarea>
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- Backup Section -->

        <div class="row mt-4">

            <!-- Schedule Backup -->

            <div class="col-md-6">

                <div class="card shadow-sm">

                    <div class="card-header bg-warning">

                            <button onclick="scheduleBackup()">
                               Schedule Backup
                            </button>
                    

                    </div>

                    <div class="card-body">

                        <select id="scheduleLocation"
                                class="form-select mb-3">

                            <option>Local Drive</option>
                            <option>Google Drive</option>
                            <option>File Server</option>

                        </select>

                        <input type="text"
                               id="schedulePath"
                               class="form-control mb-3"
                               placeholder="Backup Path">

                        <input type="datetime-local"
                               id="scheduleTime"
                               class="form-control mb-3">

                        <button class="btn btn-warning w-100"
                                onclick="scheduleBackup()">

                            Schedule Backup

                        </button>

                        <small class="text-danger d-block mt-3">

                            * If one backup is scheduled then another backup cannot be scheduled.

                        </small>

                    </div>

                </div>

            </div>

            <!-- Backup Now -->

            <div class="col-md-6">

                <div class="card shadow-sm">

                    <div class="card-header bg-success text-white">

                        <h5 class="mb-0">
                            <i class="fa-solid fa-play"></i>
                            Backup Now
                        </h5>

                    </div>

                    <div class="card-body">

                        <select id="backupLocation"
                                class="form-select mb-3">

                            <option>Local Drive</option>
                            <option>Google Drive</option>
                            <option>File Server</option>

                        </select>

                        <input type="text"
                               id="backupPath"
                               class="form-control mb-3"
                               placeholder="Backup Path">

                        <button class="btn btn-success w-100"
                                onclick="startBackup()">

                            Backup Now

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- ADD INSTANCE TAB -->

    <div id="instanceTab" style="display:none;">

        <div class="card shadow-sm">

            <div class="card-header bg-primary text-white">

                <h5 class="mb-0">
                    Add New Instance
                </h5>

            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-6 mx-auto">

                        <input id="serverName"
                               class="form-control mb-3"
                               placeholder="Instance Name">

                        <select id="databaseTypeInput"
                                class="form-select mb-3">

                            <option>MySQL</option>
                            <option>Oracle</option>

                        </select>

                        <input id="ipAddress"
                               class="form-control mb-3"
                               placeholder="Instance IP">

                        <input id="portNumber"
                               class="form-control mb-3"
                               placeholder="Port Number">

                        <input id="dbName"
                               class="form-control mb-3"
                               placeholder="Database Name">

                        <input id="dbUsername"
                               class="form-control mb-3"
                               placeholder="Database Username">

                        <input id="dbPassword"
                               type="password"
                               class="form-control mb-3"
                               placeholder="Database Password">       

                        <button
                               class="btn btn-warning me-2"
                               onclick="checkConnection()">

                                 Check Connection

                        </button>

                        <button class="btn btn-primary"
                                onclick="addServer()">

                            Submit

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- LOGS TAB -->

    <div id="logsTab" style="display:none;">

        <div class="card shadow-sm">

            <div class="card-header bg-dark text-white">

                <h5 class="mb-0">
                    Backup Logs
                </h5>

            </div>

            <div class="card-body">

                <table class="table table-striped">

                    <thead>

                    <tr>
                        <th>ID</th>
                        <th>Server</th>
                        <th>Backup Type</th>
                        <th>Status</th>
                        <th>Progress</th>
                    </tr>

                    </thead>

                    <tbody id="logsContainer">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="js/home.js"></script>

</body>
</html>
