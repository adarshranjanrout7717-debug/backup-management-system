<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Indian Railways - Backup Monitoring System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style1.css">
</head>

<body>

    <header class="header">

        <img src="https://2.bp.blogspot.com/-uk86V6JIxWg/TzaJiXXwCxI/AAAAAAAAECk/nW0774OIn80/s1600/indian_railway_logo.jpg"
            class="logo" alt="Indian Railways Logo">

        <div>
            <h1>Indian Railways</h1>
            <p>Railway Backup Monitoring System</p>
        </div>

    </header>

    <main class="main-container">

        <!-- Slider -->

        <div class="slider-box">

            <img class="slide active"
                src="https://indianmasterminds.com/wp-content/uploads/2024/11/IAS-Extension-10.jpg">

            <img class="slide"
                src="https://cdn.siasat.com/wp-content/uploads/2023/04/vande-bharat.png">

            <img class="slide"
                src="https://www.railway.supply/wp-content/uploads/2025/01/img_9615-1.jpeg">

            <img class="slide"
                src="https://www.newsonair.gov.in/wp-content/uploads/2025/04/Ministry_of_Railways_India-1200x589.jpg">

        </div>

        <!-- Login -->

        <section class="login-section">

            <div class="login-card">

                <div class="text-center">

                    <div class="train-circle">

                        <img src="https://2.bp.blogspot.com/-uk86V6JIxWg/TzaJiXXwCxI/AAAAAAAAECk/nW0774OIn80/s1600/indian_railway_logo.jpg">

                    </div>

                    <h2 class="welcome-title">Welcome Back</h2>

                    <p class="text-muted">
                        Sign in to continue to your account
                    </p>

                </div>

                <div class="mb-3">

                    <label class="form-label">Username</label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="fa-solid fa-user"></i>
                        </span>

                        <input type="text"
                            id="username"
                            class="form-control"
                            placeholder="Enter username">

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">Password</label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="fa-solid fa-lock"></i>
                        </span>

                        <input type="password"
                            id="password"
                            class="form-control"
                            placeholder="Enter password">

                    </div>

                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <div class="form-check">

                        <input class="form-check-input"
                            type="checkbox"
                            id="rememberMe">

                        <label class="form-check-label"
                            for="rememberMe">

                            Remember Me

                        </label>

                    </div>

                    <a href="#" class="forgot-link">
                        Forgot Password?
                    </a>

                </div>

                <button class="login-btn" onclick="login()">
                    Sign In
                    <i class="fa-solid fa-arrow-right ms-2"></i>
                </button>

                <div class="footer-text">

                    Railway Backup Monitoring System

                    <br>

                    Version 1.0.0 | Production Environment

                </div>

            </div>

        </section>

    </main>

    <footer class="footer">

        Ministry of Railways | Government of India

    </footer>

    <script src="js/login.js"></script>

    <script>

        let current = 0;

        const slides = document.querySelectorAll(".slide");

        function nextSlide() {

            slides[current].classList.remove("active");

            current = (current + 1) % slides.length;

            slides[current].classList.add("active");

        }

        setInterval(nextSlide, 3000);

    </script>
    <script>
window.addEventListener("pageshow", function () {

    localStorage.removeItem("token");
    localStorage.removeItem("role");

    sessionStorage.clear();

    document.getElementById("username").value = "";
    document.getElementById("password").value = "";

});
</script>

</body>

</html>
