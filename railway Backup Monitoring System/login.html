<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RBMS Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="dashboard-container">

    <div class="d-flex justify-content-center align-items-center vh-100 w-100">

        <div class="card chart-card p-4" style="width:400px;">

            <div class="text-center mb-4">

                <i class="fa-solid fa-server fa-3x mb-3"></i>

                <h2>RBMS Login</h2>

                <p>Railway Backup Monitoring System</p>

            </div>

            <input
                type="text"
                id="username"
                class="form-control mb-3"
                placeholder="Username">

            <input
                type="password"
                id="password"
                class="form-control mb-3"
                placeholder="Password">

            <button
                class="btn btn-primary w-100"
                onclick="login()">

                Login

            </button>

        </div>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
