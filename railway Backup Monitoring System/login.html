<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RBMS Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="css/style1.css">

</head>

<body>

<body>

<!-- HEADER -->

<header class="top-header">

    <div class="header-left">

        <img src="images/railway-logo.png"
             alt="Railway Logo"
             class="rail-logo">

        <div>

            <h2>Indian Railways</h2>

            <small>
                Railway Backup Monitoring System
            </small>

        </div>

    </div>

</header>

<!-- MAIN CONTENT -->

<div class="main-wrapper">

    <!-- Train Image -->

    <div class="image-card">

        <img src="images/railway.jpg"
             alt="Train">

    </div>

    <!-- Login Box -->

    <div class="login-card">

        <h1>Login Here..</h1>

        <div class="mb-4">

            <label><i class="fa-solid fa-user"></i> <b>Username</b></label>

            <input
                type="text"
                id="username"
                class="form-control"
                autocomplete="off"
                placeholder="Username">

        </div>

        <div class="mb-4">

            <label><i class="fa-solid fa-lock"></i> <b>Password</b></label>

            <input
                type="password"
                id="password"
                class="form-control"
                autocomplete="new-password"
                placeholder="Password">

        </div>

        <button
            class="btn btn-primary login-btn"
            onclick="login()">

            Login

        </button>

    </div>

</div>

<!-- FOOTER -->

<footer>

    Ministry of Railways | Government of India

</footer>

<script src="js/login.js"></script>

<script>
window.addEventListener("pageshow", function () {

    localStorage.removeItem("token");
    localStorage.removeItem("role");

    sessionStorage.clear();

    document.getElementById("username").value = "";
    document.getElementById("password").value = "";

});
</script>


</body>

</body>
</html>
